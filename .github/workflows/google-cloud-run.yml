name: Google Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/google-cloud-run.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: google-cloud-run
  cancel-in-progress: true

env:
  REGION: europe-west1
  SERVICE: mirac-saha-panel

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Google Cloud kimliği
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: gcloud kur
        uses: google-github-actions/setup-gcloud@v2

      - name: Projeyi seç
        run: gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Container imajını oluştur
        run: gcloud builds submit --tag "gcr.io/${{ secrets.GCP_PROJECT_ID }}/$SERVICE:$GITHUB_SHA" .

      - name: Cloud Run'a yayınla
        run: |
          gcloud run deploy "$SERVICE" \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/$SERVICE:$GITHUB_SHA" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Canlı adres
        run: gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)'
