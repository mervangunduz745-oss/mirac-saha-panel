name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4
      - name: Yayın dosyalarını doğrula
        run: |
          test -f public/index.html
          test -f public/firebase-cloud.js
          test -f public/firebase-config.js
          test -f public/catalog-inventory.js
          test -f public/manifest.webmanifest
          test -f public/sw.js
          if grep -R -n -E '^(<<<<<<< .*|=======|>>>>>>> .*)$' public; then
            echo 'Yayın durduruldu: public klasöründe çözülmemiş birleştirme çatışması var.' >&2
            exit 1
          fi
      - name: Pages yapılandır
        uses: actions/configure-pages@v6
      - name: Yayın paketini hazırla
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v5
