name: Firebase Live Deploy

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-live-deploy.yml"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: firebase-live-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tamam-d1caa hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Yayın dosyalarını doğrula
        shell: bash
        run: |
          test -f firebase.json
          test -f public/index.html
          test -f public/siyah-saha-paneli.html
          test -f public/siyah-saha-canli.js

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Firebase kimliğini hazırla
        id: auth
        shell: bash
        env:
          SA_PROJECT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAMAM_D1CAA }}
          SA_GENERIC: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN_VALUE: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$SA_PROJECT" ]; then
            printf '%s' "$SA_PROJECT" > "$RUNNER_TEMP/firebase-service-account.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
            echo "mode=service-account" >> "$GITHUB_OUTPUT"
          elif [ -n "$SA_GENERIC" ]; then
            printf '%s' "$SA_GENERIC" > "$RUNNER_TEMP/firebase-service-account.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
            echo "mode=service-account" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_TOKEN_VALUE" ]; then
            echo "FIREBASE_TOKEN_VALUE=$FIREBASE_TOKEN_VALUE" >> "$GITHUB_ENV"
            echo "mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Firebase dağıtım kimliği bulunamadı. Repo Secret olarak FIREBASE_SERVICE_ACCOUNT_TAMAM_D1CAA veya FIREBASE_TOKEN gerekir."
            exit 1
          fi

      - name: Firebase CLI kur
        run: npm install --global firebase-tools@15.24.0

      - name: Servis hesabıyla canlıya al
        if: steps.auth.outputs.mode == 'service-account'
        run: firebase deploy --only hosting --project tamam-d1caa --non-interactive

      - name: Firebase token ile canlıya al
        if: steps.auth.outputs.mode == 'token'
        run: firebase deploy --only hosting --project tamam-d1caa --non-interactive --token "$FIREBASE_TOKEN_VALUE"
