name: QA

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-migration:
    name: Static and migration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install migration test dependency
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Run cloud static QA
        shell: pwsh
        run: ./tests/run-tests.ps1 -CloudOnly -StrictWarnings

      - name: Run migration unit tests
        run: python -m unittest tools.tests.test_mirac_migration -v
