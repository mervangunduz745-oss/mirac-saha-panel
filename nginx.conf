server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index siyah-saha-paneli.html index.html;

  location = / {
    try_files /siyah-saha-paneli.html =404;
  }

  location / {
    try_files $uri $uri/ /siyah-saha-paneli.html;
  }

  location ~* \.(js|css|svg|png|jpg|jpeg|webp|ico|json|webmanifest)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }
}
