<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06101f">
  <title>Miraç Panel Mobil Giriş</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #f8fbff;
      --muted: #c5d3e8;
      --line: rgba(255,255,255,.20);
      --brand: #06101f;
      --brand-2: #00a86b;
      --blue: #0067d8;
      --amber: #ffb000;
      --paper: #ffffff;
      --wash: #f3f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      color: var(--ink);
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 1px, transparent 1px 18px),
        linear-gradient(135deg, rgba(0,168,107,.22), rgba(0,103,216,.18) 42%, rgba(255,176,0,.16)),
        linear-gradient(135deg, #06101f, #102f58 58%, #0a5967);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    main {
      width: min(100%, 430px);
      background: rgba(255,255,255,.10);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .30);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .mark {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 0 0 4px rgba(0,168,107,.18), 0 14px 30px rgba(0,103,216,.22);
    }

    h1 {
      font-size: 24px;
      line-height: 1.16;
      margin: 0;
      letter-spacing: 0;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 15px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    a,
    button {
      min-height: 52px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.22);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, #07111f, var(--blue));
      border-color: rgba(255,255,255,.28);
      box-shadow: 0 16px 34px rgba(0, 103, 216, .28);
    }

    .secondary {
      color: #f8fbff;
      background: rgba(255,255,255,.10);
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(0, 168, 107, .38);
      background: rgba(0, 168, 107, .12);
      color: #dff9ea;
      font-size: 14px;
      line-height: 1.4;
    }

    .address {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px dashed rgba(255,255,255,.26);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      background: rgba(255,255,255,.08);
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="mark">M</div>
      <div>
        <h1>Miraç Panel</h1>
        <p>Saha kokpiti</p>
      </div>
    </div>

    <div class="actions">
      <a class="primary" href="/?fresh=1&mobil=1&v=mobile-v27" aria-label="Miraç paneline gir">Saha Paneline Gir</a>
      <button class="secondary" type="button" id="copyLink">Linki Kopyala</button>
    </div>

    <div class="status" id="status">Canlı panel hazır.</div>
    <div class="address">https://tamam-d1caa.web.app/mobil</div>
  </main>

  <script>
    const status = document.getElementById("status");
    document.getElementById("copyLink").addEventListener("click", async () => {
      const link = "https://tamam-d1caa.web.app/mobil?v=mobile-v27";
      try {
        await navigator.clipboard.writeText(link);
        status.textContent = "Link kopyalandı.";
      } catch {
        status.textContent = link;
      }
    });
  </script>
</body>
</html>
